# ============================================================================
#  SQLi With A Twist  -  the lab web app (Docker).
#  The DATABASE runs on your Windows host (SQL Server Developer Edition).
#  This file starts ONLY the web app and points it at the host database.
#  Setup + seeding: see README.md.
#
#  ONE COMMAND (after the DB is seeded):  docker compose up --build
#  Then browse to http://localhost:8080
#
#  SAFETY: the web app publishes on 127.0.0.1 ONLY. Intentionally vulnerable —
#  never bind it to a public interface.
# ============================================================================
name: sqli-with-a-twist

services:
  web:
    build:
      context: ./web
    image: sqli-lab-web
    container_name: sqli_lab_web
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      # Connects to SQL Server running on the Windows host, as the webapp login.
      ConnectionStrings__StoreDb: "Server=host.docker.internal,1433;Database=StoreDb;User ID=webapp;Password=${WEBAPP_PASSWORD};Encrypt=False;TrustServerCertificate=True"
      # Cosmetic IIS/ASP.NET response headers for realistic Burp screenshots.
      FakeIisHeaders: "true"
    ports:
      - "127.0.0.1:8080:8080"   # localhost only
    extra_hosts:
      - "host.docker.internal:host-gateway"
